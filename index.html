<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>&#47196;&#46608; &#48264;&#54840; &#49373;&#49457;&#44592;</title>
  <script>
    (function () {
      const storageKey = "lotto-theme";

      try {
        const savedTheme = localStorage.getItem(storageKey);
        const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
        const theme = savedTheme === "dark" || savedTheme === "light"
          ? savedTheme
          : systemTheme;

        document.documentElement.setAttribute("data-theme", theme);
      } catch (error) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: linear-gradient(135deg, #fff4d6, #ffd59e);
      --card: rgba(255, 255, 255, 0.88);
      --card-border: rgba(255, 255, 255, 0.65);
      --text: #27211a;
      --muted: #5f4b37;
      --accent: #ff7a00;
      --accent-dark: #d85f00;
      --shadow: 0 18px 40px rgba(125, 71, 15, 0.18);
      --toggle-bg: rgba(255, 255, 255, 0.72);
      --toggle-hover: rgba(255, 255, 255, 0.95);
      --toggle-border: rgba(108, 78, 35, 0.16);
      --toggle-shadow: 0 8px 20px rgba(125, 71, 15, 0.12);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: linear-gradient(135deg, #0f1724, #1c2636);
      --card: rgba(23, 30, 43, 0.9);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f4f7fb;
      --muted: #b6c0d0;
      --accent: #ff9430;
      --accent-dark: #ff6a00;
      --shadow: 0 22px 48px rgba(2, 8, 18, 0.45);
      --toggle-bg: rgba(255, 255, 255, 0.06);
      --toggle-hover: rgba(255, 255, 255, 0.12);
      --toggle-border: rgba(255, 255, 255, 0.12);
      --toggle-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .card {
      width: min(100%, 480px);
      padding: 32px 28px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(8px);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    p {
      margin: 0 0 24px;
      line-height: 1.6;
    }

    button {
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease, border-color 0.2s ease;
      font-family: inherit;
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      min-height: 72px;
    }

    .ball {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 8px 18px rgba(255, 122, 0, 0.25);
    }

    .ball-yellow {
      background: linear-gradient(135deg, #f7c500, #ffd84d);
      box-shadow: 0 8px 18px rgba(247, 197, 0, 0.32);
    }

    .ball-blue {
      background: linear-gradient(135deg, #2a7de1, #63a8ff);
      box-shadow: 0 8px 18px rgba(42, 125, 225, 0.28);
    }

    .ball-red {
      background: linear-gradient(135deg, #e74b3c, #ff7b6f);
      box-shadow: 0 8px 18px rgba(231, 75, 60, 0.28);
    }

    .ball-gray {
      background: linear-gradient(135deg, #6c7480, #9ca4b0);
      box-shadow: 0 8px 18px rgba(108, 116, 128, 0.28);
    }

    .ball-green {
      background: linear-gradient(135deg, #1f9d55, #49c77c);
      box-shadow: 0 8px 18px rgba(31, 157, 85, 0.28);
    }

    .generate-btn {
      border: 0;
      padding: 14px 26px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      box-shadow: 0 10px 24px rgba(216, 95, 0, 0.25);
    }

    .generate-btn:hover,
    .theme-toggle:hover {
      transform: translateY(-2px);
    }

    .generate-btn:active,
    .theme-toggle:active {
      transform: translateY(0);
    }

    .theme-toggle {
      border: 1px solid var(--toggle-border);
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      background: var(--toggle-bg);
      box-shadow: var(--toggle-shadow);
    }

    .theme-toggle:hover {
      background: var(--toggle-hover);
    }

    .hint {
      margin-top: 16px;
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="toolbar">
      <button type="button" class="theme-toggle" id="themeToggleBtn">&#45796;&#53356; &#47784;&#46300;</button>
    </div>

    <h1>&#47196;&#46608; &#48264;&#54840; &#49373;&#49457;&#44592;</h1>
    <p>&#48260;&#53948;&#51012; &#45572;&#47476;&#47732; 1&#48512;&#53552; 45 &#49324;&#51060;&#51032; &#48264;&#54840; 6&#44060;&#47484; &#51473;&#48373; &#50630;&#51060; &#49373;&#49457;&#54633;&#45768;&#45796;.</p>

    <section class="numbers" id="numbers" aria-live="polite"></section>

    <button type="button" class="generate-btn" id="generateBtn">&#48264;&#54840; &#49373;&#49457;&#54616;&#44592;</button>
    <div class="hint">&#49373;&#49457;&#46108; &#48264;&#54840;&#45716; &#50724;&#47492;&#52264;&#49692;&#51004;&#47196; &#51221;&#47148;&#46121;&#45768;&#45796;.</div>
  </main>

  <script>
    const rootEl = document.documentElement;
    const numbersEl = document.getElementById("numbers");
    const generateBtn = document.getElementById("generateBtn");
    const themeToggleBtn = document.getElementById("themeToggleBtn");
    const themeStorageKey = "lotto-theme";

    function getCurrentTheme() {
      return rootEl.getAttribute("data-theme") === "dark" ? "dark" : "light";
    }

    function updateThemeToggle(theme) {
      const nextLabel = theme === "dark"
        ? "\uD654\uC774\uD2B8 \uBAA8\uB4DC"
        : "\uB2E4\uD06C \uBAA8\uB4DC";

      themeToggleBtn.textContent = nextLabel;
      themeToggleBtn.setAttribute("aria-pressed", String(theme === "dark"));
    }

    function applyTheme(theme) {
      rootEl.setAttribute("data-theme", theme);
      updateThemeToggle(theme);

      try {
        localStorage.setItem(themeStorageKey, theme);
      } catch (error) {
      }
    }

    function createLottoNumbers() {
      const picked = new Set();

      while (picked.size < 6) {
        picked.add(Math.floor(Math.random() * 45) + 1);
      }

      return [...picked].sort((a, b) => a - b);
    }

    function getBallColorClass(number) {
      if (number <= 10) {
        return "ball-yellow";
      }

      if (number <= 20) {
        return "ball-blue";
      }

      if (number <= 30) {
        return "ball-red";
      }

      if (number <= 40) {
        return "ball-gray";
      }

      return "ball-green";
    }

    function renderNumbers() {
      const numbers = createLottoNumbers();
      numbersEl.innerHTML = "";

      numbers.forEach((number) => {
        const ball = document.createElement("div");
        ball.className = `ball ${getBallColorClass(number)}`;
        ball.textContent = number;
        numbersEl.appendChild(ball);
      });
    }

    themeToggleBtn.addEventListener("click", () => {
      const nextTheme = getCurrentTheme() === "dark" ? "light" : "dark";
      applyTheme(nextTheme);
    });

    generateBtn.addEventListener("click", renderNumbers);
    updateThemeToggle(getCurrentTheme());
    renderNumbers();
  </script>
</body>
</html>
